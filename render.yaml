services:
  - type: web
    name: askelena
    runtime: python
    plan: free
    buildCommand: |
      curl -fsSL https://get.pnpm.io/install.sh | sh -
      export PATH="$HOME/.local/share/pnpm:$PATH"
      pnpm install
      npx prisma generate
      npx prisma db push --accept-data-loss
      pnpm run build
      npx tsx prisma/seed.ts
      pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        value: file:./dev.db
      - key: ASKELENA_DATABASE_URL
        value: file:./dev.db
      - key: NODE_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: NODE_VERSION
        value: "20.18.0"
